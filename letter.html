<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise For You ✨</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- Base, header, letter, modal, playlist, music, surprise button styles --- */
        /* Your existing CSS remains the same. No changes needed except modal-overlay active class is fine */
        .modal-overlay.active {opacity:1; visibility:visible;}
        .modal-overlay {display:flex; justify-content:center; align-items:center; visibility:hidden; opacity:0; transition:all 0.3s ease;}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>For My Bravest Boyy ❤️</h1>
        </header>

        <div class="letter-container">
            <div class="letter" id="typed-text"></div>
        </div>

        <div class="video-container" id="video-message">
            <iframe src="about:blank" frameborder="0" allowfullscreen></iframe>
        </div>

        <div class="surprise-button-container">
            <button class="surprise-button" id="surprise-button">Click for a Surprise! 🎁</button>
        </div>

        <div class="navigation">
            <a href="javascript:history.back()" class="back-button"><i class="fas fa-arrow-left"></i> Back to Birthday Cake</a>
        </div>
    </div>

    <!-- Modal for Surprise -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <button class="modal-close" id="modal-close">×</button>
            <div class="modal-header">
                <h2>🎉 Your Special Surprise! 🎉</h2>
            </div>
            <div class="modal-body">
                <div class="playlist">
                    <h3 style="margin-bottom:15px;">Songs That Remind Me of Us 💕</h3>

                    <div class="playlist-item" data-src="s1.mp3">
                        <img src="c1.jpg" alt="Song cover">
                        <div class="playlist-item-info">
                            <div class="playlist-item-title">Ek Ladki Bheegi Bhaagi Si</div>
                            <div class="playlist-item-artist">Kishore Kumar</div>
                        </div>
                        <button class="playlist-item-play"><i class="fas fa-play"></i></button>
                    </div>

                    <div class="playlist-item" data-src="s2.mp3">
                        <img src="c2.jpg" alt="Song cover">
                        <div class="playlist-item-info">
                            <div class="playlist-item-title">Kyon</div>
                            <div class="playlist-item-artist">Pritam</div>
                        </div>
                        <button class="playlist-item-play"><i class="fas fa-play"></i></button>
                    </div>

                    <div class="playlist-item" data-src="s3.mp3">
                        <img src="c3.jpg" alt="Song cover">
                        <div class="playlist-item-info">
                            <div class="playlist-item-title">Chaar Kadam</div>
                            <div class="playlist-item-artist">Shaan</div>
                        </div>
                        <button class="playlist-item-play"><i class="fas fa-play"></i></button>
                    </div>

                    <div class="playlist-item" data-src="s4.mp3">
                        <img src="c4.jpeg" alt="Song cover">
                        <div class="playlist-item-info">
                            <div class="playlist-item-title">Aaj Se Teri</div>
                            <div class="playlist-item-artist">Amit Trivedi</div>
                        </div>
                        <button class="playlist-item-play"><i class="fas fa-play"></i></button>
                    </div>

                    <div class="playlist-item" data-src="s5.mp3">
                        <img src="c5.jpg" alt="Song cover">
                        <div class="playlist-item-info">
                            <div class="playlist-item-title">Sailor Song</div>
                            <div class="playlist-item-artist">Gigi Perez</div>
                        </div>
                        <button class="playlist-item-play"><i class="fas fa-play"></i></button>
                    </div>

                </div>

                <div style="margin-top:20px;">
                    <a href="#" download class="back-button" style="background:#ffb6c1; border-color:#ffb6c1; color:white;">
                        <i class="fas fa-download"></i> Download Your Digital Gift
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Music Controls -->
    <div class="music-controls" id="music-toggle">
        <i class="fas fa-volume-mute" id="music-icon"></i>
    </div>

    <!-- Audio Elements -->
    <audio id="click-sound" preload="auto">
        <source src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_bb630cc098.mp3?filename=cute-notification-ringtone-1-173850.mp3" type="audio/mpeg">
    </audio>
    <audio id="background-music" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=relaxing-145038.mp3" type="audio/mpeg">
    </audio>

    <!-- Playlist Player -->
    <audio id="audio-player"></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.0.12/typed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/canvas-confetti/1.5.1/confetti.browser.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Surprise button & modal
            const surpriseButton = document.getElementById('surprise-button');
            const modalOverlay = document.getElementById('modal-overlay');
            const modalClose = document.getElementById('modal-close');
            const clickSound = document.getElementById('click-sound');

            surpriseButton.addEventListener('click', function() {
                clickSound.play();
                modalOverlay.classList.add('active');
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            });

            modalClose.addEventListener('click', function() {
                modalOverlay.classList.remove('active');
            });

            // Music controls
            const musicToggle = document.getElementById('music-toggle');
            const musicIcon = document.getElementById('music-icon');
            const backgroundMusic = document.getElementById('background-music');
            let isMusicPlaying = false;

            musicToggle.addEventListener('click', function() {
                if(isMusicPlaying){
                    backgroundMusic.pause();
                    musicIcon.classList.remove('fa-volume-up');
                    musicIcon.classList.add('fa-volume-mute');
                } else {
                    backgroundMusic.play().catch(e => console.log('Audio play error:', e));
                    musicIcon.classList.remove('fa-volume-mute');
                    musicIcon.classList.add('fa-volume-up');
                }
                isMusicPlaying = !isMusicPlaying;
            });

            // Playlist functionality
            const player = document.getElementById('audio-player');
            const playlistItems = document.querySelectorAll('.playlist-item');

            playlistItems.forEach(item => {
                item.addEventListener('click', () => {
                    const song = item.getAttribute('data-src');

                    // Stop background music
                    backgroundMusic.pause();
                    isMusicPlaying = false;
                    musicIcon.classList.remove('fa-volume-up');
                    musicIcon.classList.add('fa-volume-mute');

                    // Play selected song
                    player.src = song;
                    player.play();
                });
            });
        });
    </script>
</body>
</html>
